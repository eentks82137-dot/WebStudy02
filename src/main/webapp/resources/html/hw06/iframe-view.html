  <style>
    .resizable {
      resize: both;
      overflow: auto;
    }
  </style>
  <body>
    <h4>iframe 보안 정책 확인</h4>
    <iframe
      class="resizable"
      src="http://localhost:8080/hw06/proxy-headers?target=https://m.naver.com/"
      width="100%"
    ></iframe>

    <iframe
      class="resizable"
      src="https://pokeapi.co/api/v2/pokemon/ditto"
      width="100%"
      height="300px"
    ></iframe>
    <iframe
      class="resizable"
      src="http://localhost:8080/hw06/proxy-headers?target=https://developer.mozilla.org/ko/docs/Web/HTTP/Reference/Headers"
      width="100%"
      height="300px"
    ></iframe>
  </body>
